<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width,initial-scale=1">
  <title>Registrar venta</title>
  <link rel="stylesheet" href="../css/estilos.css">
  <style>
    body { background:#f5f3ee; min-height:100vh; }
    .topbar { display:flex; align-items:center;
      gap:10px; padding:14px 16px; background:#fff;
      border-bottom:0.5px solid #eee;
      position:sticky; top:0; z-index:10; }
    .btn-back { background:#f5f3ee; color:#555;
      border:0.5px solid #ddd; border-radius:8px;
      padding:6px 12px; font-size:13px;
      cursor:pointer; width:auto; }
    .topbar-titulo { font-size:15px;
      font-weight:500; color:#1a1a1a; flex:1; }

    .buscar-wrap { padding:12px 16px;
      background:#fff;
      border-bottom:0.5px solid #eee; }
    .buscar-wrap input { width:100%;
      box-sizing:border-box; }

    .cats { display:flex; gap:6px;
      padding:10px 16px; overflow-x:auto;
      background:#fff;
      border-bottom:0.5px solid #eee; }
    .cats::-webkit-scrollbar { display:none; }
    .cat-pill { font-size:12px; padding:5px 12px;
      border-radius:20px; white-space:nowrap;
      border:0.5px solid #ddd; background:#fff;
      cursor:pointer; color:#555;
      transition:all .15s; flex-shrink:0; }
    .cat-pill.active { background:#1D9E75;
      color:#fff; border-color:#1D9E75; }

    .prod-grid { display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px; padding:12px; }
    .prod-card { background:#fff;
      border:0.5px solid #eee;
      border-radius:10px; padding:10px;
      transition:border-color .15s; }
    .prod-card.seleccionado {
      border:1.5px solid #1D9E75;
      background:#f0fdf8; }
    .prod-nombre { font-size:13px;
      font-weight:500; color:#1a1a1a; }
    .prod-precio { font-size:12px;
      color:#888; margin-top:2px; }
    .prod-qty { display:flex;
      align-items:center; gap:8px;
      margin-top:8px; }
    .qty-btn { width:28px; height:28px;
      border-radius:7px; border:0.5px solid #ddd;
      background:#f5f3ee; font-size:17px;
      font-weight:500; cursor:pointer;
      color:#333; display:flex;
      align-items:center; justify-content:center; }
    .qty-num { font-size:14px; font-weight:500;
      min-width:22px; text-align:center;
      color:#1a1a1a; }

    .resumen-bar { background:#fff;
      border-top:0.5px solid #eee;
      padding:12px 16px; }
    .resumen-titulo { font-size:12px;
      font-weight:500; color:#888;
      margin-bottom:8px; }
    .resumen-item { display:flex;
      justify-content:space-between;
      font-size:13px; padding:3px 0;
      border-bottom:0.5px solid #f0ede6; }
    .resumen-item:last-of-type {
      border-bottom:none; }
    .resumen-vacio { font-size:13px;
      color:#bbb; text-align:center;
      padding:4px 0; }
    .total-row { display:flex;
      justify-content:space-between;
      font-size:16px; font-weight:600;
      padding-top:10px; margin-top:4px;
      border-top:1px solid #ddd; }
    .btn-cobrar { width:100%; padding:13px;
      background:#1D9E75; color:#fff;
      border:none; border-radius:10px;
      font-size:15px; font-weight:500;
      cursor:pointer; margin-top:10px; }
    .btn-cobrar:disabled { background:#ccc;
      cursor:default; }
  </style>
</head>
<body>

<div class="topbar">
  <button class="btn-back"
          onclick="history.back()">← Tienda</button>
  <span class="topbar-titulo"
        id="titulo">Registrar venta</span>
</div>

<div class="buscar-wrap">
  <input type="text" id="buscar"
         placeholder="Buscar producto..."
         oninput="renderProductos()">
</div>

<div class="cats" id="cats"></div>

<div class="prod-grid" id="prod-grid"></div>

<div class="resumen-bar">
  <div class="resumen-titulo">Resumen</div>
  <div id="resumen">
    <div class="resumen-vacio">
      Sin productos aún</div>
  </div>
  <button class="btn-cobrar" id="btn-cobrar"
          disabled onclick="irACobro()">
    Continuar a cobro
  </button>
</div>

<script type="module">
import { supabase, getUsuario }
  from '../js/supabase.js'

let productos  = []
let carrito    = {}   // { producto_id: cantidad }
let catActiva  = 'Todos'
let visitaId   = null
let tiendaNombre = ''

async function iniciar() {
  const usuario = await getUsuario()
  if (!usuario) {
    location.href = 'login.html'; return
  }

  visitaId     = sessionStorage.getItem('visita_id')
  tiendaNombre = sessionStorage.getItem('tienda_nombre')

  if (!visitaId) {
    location.href = 'ruta.html'; return
  }

  document.getElementById('titulo')
    .textContent = tiendaNombre || 'Registrar venta'

  // Cargar productos activos
  const { data } = await supabase
    .from('productos')
    .select('*')
    .eq('activo', true)
    .order('categoria')

  productos = data || []
  renderCats()
  renderProductos()
}

function renderCats() {
  const cats = ['Todos',
    ...new Set(productos.map(p => p.categoria)
      .filter(Boolean))]
  document.getElementById('cats').innerHTML =
    cats.map(c => `
      <span class="cat-pill ${c===catActiva?'active':''}"
            onclick="setCat('${c}')">${c}</span>`
    ).join('')
}

window.setCat = c => {
  catActiva = c
  renderCats()
  renderProductos()
}

window.renderProductos = () => {
  const q = document.getElementById('buscar')
    .value.toLowerCase()
  const filtrados = productos.filter(p =>
    (catActiva === 'Todos' || p.categoria === catActiva)
    && p.nombre.toLowerCase().includes(q)
  )
  document.getElementById('prod-grid').innerHTML =
    filtrados.map(p => {
      const qty = carrito[p.id] || 0
      return `
      <div class="prod-card ${qty>0?'seleccionado':''}">
        <div class="prod-nombre">${p.nombre}</div>
        <div class="prod-precio">
          $${parseFloat(p.precio_unitario).toFixed(2)} c/u
        </div>
        <div class="prod-qty">
          <button class="qty-btn"
            onclick="cambiarQty('${p.id}',-1)">−</button>
          <span class="qty-num">${qty}</span>
          <button class="qty-btn"
            onclick="cambiarQty('${p.id}',1)">+</button>
        </div>
      </div>`
    }).join('')
  renderResumen()
}

window.cambiarQty = (id, delta) => {
  const actual = carrito[id] || 0
  const nuevo  = Math.max(0, actual + delta)
  if (nuevo === 0) delete carrito[id]
  else             carrito[id] = nuevo
  renderProductos()
}

function renderResumen() {
  const items = Object.entries(carrito)
  const el    = document.getElementById('resumen')
  const btn   = document.getElementById('btn-cobrar')

  if (!items.length) {
    el.innerHTML =
      '<div class="resumen-vacio">Sin productos aún</div>'
    btn.disabled = true
    return
  }

  let total = 0
  el.innerHTML = items.map(([id, qty]) => {
    const p   = productos.find(x => x.id === id)
    const sub = qty * parseFloat(p.precio_unitario)
    total    += sub
    return `
      <div class="resumen-item">
        <span>${p.nombre} ×${qty}</span>
        <span>$${sub.toFixed(2)}</span>
      </div>`
  }).join('') + `
    <div class="total-row">
      <span>Total</span>
      <span style="color:#1D9E75">
        $${total.toFixed(2)}</span>
    </div>`

  btn.disabled = false
  // Guardamos el total para la pantalla de cobro
  sessionStorage.setItem('venta_total',
    total.toFixed(2))
  sessionStorage.setItem('venta_carrito',
    JSON.stringify(carrito))
}

window.irACobro = () => {
  location.href = 'cobro.html'
}

iniciar()
</script>

</body>
</html>
